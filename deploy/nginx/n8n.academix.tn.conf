# System-nginx vhost — n8n.academix.tn (Droplet A · 178.128.51.137)
# Install: cp to sites-available ; symlink ; install :80 first, then:
#   certbot --nginx -d n8n.academix.tn
# Container: n8n on 127.0.0.1:5678 (docker-compose.droplet-a.yml).
#
# n8n needs WebSockets (editor push / live executions) and long-running
# requests — hence the Upgrade headers and the extended read timeout.

server {
    listen 80;
    listen [::]:80;
    server_name n8n.academix.tn;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name n8n.academix.tn;

    ssl_certificate     /etc/letsencrypt/live/n8n.academix.tn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n.academix.tn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 16m;   # binary data in workflows / uploads

    location / {
        proxy_pass         http://127.0.0.1:5678;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket upgrade (n8n editor push, execution stream)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 3600s;            # long-running executions
        proxy_send_timeout 3600s;
    }
}
