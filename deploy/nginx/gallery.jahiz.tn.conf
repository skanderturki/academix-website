# System-nginx vhost — gallery.jahiz.tn (Droplet B · 165.232.175.224)
# Install: cp to sites-available ; symlink ; install :80 first, then:
#   certbot --nginx -d gallery.jahiz.tn
# Container: nadart-evo gallery on 127.0.0.1:3001 (docker-compose.droplet-b.yml).

server {
    listen 80;
    listen [::]:80;
    server_name gallery.jahiz.tn;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gallery.jahiz.tn;

    ssl_certificate     /etc/letsencrypt/live/gallery.jahiz.tn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gallery.jahiz.tn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 12m;   # gallery image uploads (app MAX_FILE_SIZE = 10 MB)

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
