# System-nginx vhost — info.baximize.com  (bacinfo · Droplet B · 165.232.175.224)
# PLACEHOLDER: bacinfo is not yet relocated into d:/jahiz (currently at
# C:\Users\skand\Desktop\informatque bac techno). Confirm its container port and
# needs (upload size, websockets?) when adding the service to
# docker-compose.droplet-b.yml. This draft assumes 127.0.0.1:3006.
#
# DNS: info.baximize.com lives in the baximize.com zone (NOT academix.tn) —
# point its A record at the droplet, then: certbot --nginx -d info.baximize.com
# Install: cp to sites-available ; symlink ; install :80 first, then run certbot.

server {
    listen 80;
    listen [::]:80;
    server_name info.baximize.com;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name info.baximize.com;

    ssl_certificate     /etc/letsencrypt/live/info.baximize.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/info.baximize.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 8m;   # adjust to bacinfo's needs

    location / {
        proxy_pass         http://127.0.0.1:3006;   # TODO: confirm bacinfo's port
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
