# System-nginx vhost — pmp.academix.tn (Droplet B · 165.232.175.224)
# Install: cp to sites-available ; symlink ; install :80 first, then:
#   certbot --nginx -d pmp.academix.tn
# Container: PMP on 127.0.0.1:3002 (docker-compose.droplet-b.yml).

server {
    listen 80;
    listen [::]:80;
    server_name pmp.academix.tn;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pmp.academix.tn;

    ssl_certificate     /etc/letsencrypt/live/pmp.academix.tn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pmp.academix.tn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 5m;   # PDFs/certs are generated server-side; headroom for posts

    location / {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
