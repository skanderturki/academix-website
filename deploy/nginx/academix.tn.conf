# System-nginx vhost — academix.tn (Droplet A · 178.128.51.137)
# Install: cp to /etc/nginx/sites-available/academix.tn ; symlink into sites-enabled;
#   install with the :80 block first, then: certbot --nginx -d academix.tn -d www.academix.tn
# Container: academix marketing on 127.0.0.1:3001 (docker-compose.droplet-a.yml).

server {
    listen 80;
    listen [::]:80;
    server_name academix.tn www.academix.tn;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

# www -> apex
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.academix.tn;
    ssl_certificate     /etc/letsencrypt/live/academix.tn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/academix.tn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://academix.tn$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name academix.tn;

    ssl_certificate     /etc/letsencrypt/live/academix.tn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/academix.tn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 1m;   # marketing site + small JSON contact POSTs

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
