# =============================================================================
# Droplet B — 165.232.175.224  (heavier: prototypes)
# Hosts: pmp.academix.tn, quality.academix.tn, gallery.jahiz.tn, info.baximize.com
# =============================================================================
#
# Expected droplet layout (run compose from the academix-website checkout):
#
#   /opt/jahiz/
#     academix-website/                 <- THIS repo (this file); builds PMP + gallery (embedded)
#     academic-quality-universities/    <- sibling checkout; builds quality
#     bacinfo/                          <- TBD (not yet relocated into d:/jahiz)
#
#   cd /opt/jahiz/academix-website
#   docker compose -f docker-compose.droplet-b.yml --env-file .env.droplet-b up -d --build
#
# - One shared MongoDB (mongo:7) serves BOTH Mongo apps via separate databases
#   (pmp-learning, psu-quality). Mongo is NOT published to the host — it is only
#   reachable over the internal compose network.
# - gallery (nadart-evo) and n8n use SQLite, NOT Mongo — they don't touch this
#   instance.
# - App ports bind to 127.0.0.1; system nginx is the only public entry point.
# - Secrets use ${VAR:?…} (fail fast if missing). Define them in .env.droplet-b.
#
# RAM note: local Mongo + node-canvas (quality) build + 3 Node apps is heavy for
# a 2 GB box. Add swap, or build images off-box and `up -d` without --build.
#
# nginx → port map on this droplet:
#   pmp.academix.tn      -> 127.0.0.1:3002
#   gallery.jahiz.tn     -> 127.0.0.1:3001
#   quality.academix.tn  -> 127.0.0.1:3003
#   info.baximize.com    -> 127.0.0.1:3006  (bacinfo, once added)
# =============================================================================

name: jahiz-droplet-b

services:
  # --- shared MongoDB (internal only) ----------------------------------------
  mongo:
    image: mongo:7
    restart: always
    # No host port — internal network only.
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [proto]

  # --- pmp.academix.tn — PMP Learning Platform -------------------------------
  pmp:
    build:
      context: ./PMP website
      dockerfile: Dockerfile
    image: ghcr.io/skanderturki/pmp-website:latest
    restart: always
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      NODE_ENV: production
      PORT: "3002"
      MONGODB_URI: mongodb://mongo:27017/pmp-learning
      JWT_SECRET: ${PMP_JWT_SECRET:?set PMP_JWT_SECRET in .env.droplet-b}
      CLIENT_URL: https://pmp.academix.tn
      RESEND_API_KEY: ${PMP_RESEND_API_KEY:-}
      RESEND_FROM: ${PMP_RESEND_FROM:-PMP Learn <noreply@academix.tn>}
    depends_on:
      mongo:
        condition: service_healthy
    networks: [proto]

  # --- quality.academix.tn — Academic Quality Platform -----------------------
  quality:
    build:
      context: ../academic-quality-universities
      dockerfile: Dockerfile
    image: ghcr.io/skanderturki/academic-quality:latest
    restart: always
    ports:
      - "127.0.0.1:3003:5000"   # container listens on 5000
    environment:
      NODE_ENV: production
      PORT: "5000"
      MONGODB_URI: mongodb://mongo:27017/psu-quality
      JWT_SECRET: ${QUALITY_JWT_SECRET:?set QUALITY_JWT_SECRET in .env.droplet-b}
      ADMIN_EMAIL: ${QUALITY_ADMIN_EMAIL:?set QUALITY_ADMIN_EMAIL in .env.droplet-b}
      ADMIN_PASSWORD: ${QUALITY_ADMIN_PASSWORD:?set QUALITY_ADMIN_PASSWORD in .env.droplet-b}
      CLIENT_URL: ${QUALITY_CLIENT_URL:-https://quality.academix.tn}
      # Optional — SMTP (password-reset OTP, notifications). Blank disables.
      SMTP_HOST: ${QUALITY_SMTP_HOST:-}
      SMTP_PORT: ${QUALITY_SMTP_PORT:-587}
      SMTP_USER: ${QUALITY_SMTP_USER:-}
      SMTP_PASS: ${QUALITY_SMTP_PASS:-}
      SMTP_FROM: ${QUALITY_SMTP_FROM:-}
      SMTP_SECURE: ${QUALITY_SMTP_SECURE:-false}
      # Optional — Gemini (curriculum import + AI summaries).
      GEMINI_API_KEY: ${QUALITY_GEMINI_API_KEY:-}
      BACKUP_DIR: /app/server/backups
    volumes:
      - quality-backups:/app/server/backups
    depends_on:
      mongo:
        condition: service_healthy
    networks: [proto]

  # --- gallery.jahiz.tn — nadart-evo (SQLite, not Mongo) ---------------------
  gallery:
    build:
      context: ./mygalery/nadart_evo
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${NADART_VITE_GOOGLE_CLIENT_ID:-}
    image: ghcr.io/skanderturki/nadart-evo:latest
    restart: always
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      JWT_SECRET: ${NADART_JWT_SECRET:?set NADART_JWT_SECRET in .env.droplet-b}
      ADMIN_EMAIL: ${NADART_ADMIN_EMAIL:?set NADART_ADMIN_EMAIL in .env.droplet-b}
      ADMIN_PASSWORD: ${NADART_ADMIN_PASSWORD:?set NADART_ADMIN_PASSWORD in .env.droplet-b}
      GOOGLE_CLIENT_ID: ${NADART_GOOGLE_CLIENT_ID:-}
      N8N_WEBHOOK_URL: https://n8n.academix.tn/webhook/contact   # n8n lives on Droplet A
      N8N_AUTH_USER: ${NADART_N8N_AUTH_USER:-nadart}
      N8N_AUTH_PASSWORD: ${NADART_N8N_AUTH_PASSWORD:-}
      MAX_FILE_SIZE: "10485760"
      UPLOAD_DIR: /app/resources/galleries
    volumes:
      - ./mygalery/nadart_evo/data:/app/data
      - ./mygalery/nadart_evo/resources:/app/resources
    networks: [proto]

  # --- info.baximize.com — bacinfo (TODO) ------------------------------------
  # Not yet relocated into d:/jahiz (currently at
  # C:\Users\skand\Desktop\informatque bac techno, live at info.baximize.com).
  # Add once its repo + Dockerfile are in place. If it uses Mongo, point it at
  # the shared instance: mongodb://mongo:27017/bacinfo
  #
  # bacinfo:
  #   build:
  #     context: ../bacinfo
  #     dockerfile: Dockerfile
  #   image: bacinfo:latest
  #   restart: always
  #   ports:
  #     - "127.0.0.1:3006:3000"
  #   environment:
  #     NODE_ENV: production
  #     # MONGODB_URI: mongodb://mongo:27017/bacinfo   # if Mongo-backed
  #   # depends_on: { mongo: { condition: service_healthy } }   # if Mongo-backed
  #   networks: [proto]

networks:
  proto:
    driver: bridge

volumes:
  mongo-data:
  quality-backups:
