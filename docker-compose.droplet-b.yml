# =============================================================================
# Droplet B — 165.232.175.224  (heavier: prototypes)
# Adds pmp / quality / gallery + a shared Mongo ALONGSIDE the existing bacinfo
# stack, behind bacinfo's **Caddy** (which already owns :80/:443 and does
# automatic Let's Encrypt). No host ports, no certbot.
# =============================================================================
#
# Integration model:
#   - bacinfo runs its own compose at /home/bacinfo/bacinfo (caddy + web +
#     meilisearch) on docker network `bacinfo_app`.
#   - These services join that network (declared `edge`, external) so Caddy can
#     reverse_proxy to them BY NAME (pmp:3002, quality:5000, gallery:3001).
#   - Add the matching site blocks to bacinfo's Caddyfile (see
#     deploy/caddy/academix-apps.caddy), then reload Caddy.
#   - Mongo is on a private `internal` network only — never reachable by Caddy
#     or the host.
#
# Layout on the droplet (run from the academix-website checkout):
#   /opt/jahiz/academix-website/                   <- this repo + this file
#   /opt/jahiz/academic-quality-universities/      <- sibling checkout (quality build)
#
#   # confirm the external network name first:
#   docker network ls | grep app        # expect: bacinfo_app
#   docker compose -f docker-compose.droplet-b.yml --env-file .env.droplet-b up -d
#
# Images come from GHCR (CI builds off-box). `build:` stays for local builds.
# RAM: staying at 2 GB + swap — per-service `mem_limit`s below cap usage so one
# container can't starve bacinfo. Add swap before `up -d`:
#   fallocate -l 4G /swapfile && chmod 600 /swapfile && mkswap /swapfile && swapon /swapfile
#   echo '/swapfile none swap sw 0 0' >> /etc/fstab
# Only `quality` uses the local Mongo; PMP -> Atlas; gallery -> SQLite.
# =============================================================================

name: jahiz-droplet-b

services:
  # Local Mongo — serves ONLY quality (psu-quality). PMP stays on Atlas.
  mongo:
    image: mongo:7
    restart: always
    mem_limit: 512m
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [internal]

  pmp:
    build:
      context: ./PMP website
      dockerfile: Dockerfile
    image: ghcr.io/skanderturki/pmp-website:latest
    restart: always
    mem_limit: 320m
    expose:
      - "3002"
    environment:
      NODE_ENV: production
      PORT: "3002"
      # PMP stays on MongoDB Atlas (external) — no local Mongo dependency.
      MONGODB_URI: ${PMP_MONGODB_URI:?set PMP_MONGODB_URI (Atlas) in .env.droplet-b}
      JWT_SECRET: ${PMP_JWT_SECRET:?set PMP_JWT_SECRET in .env.droplet-b}
      CLIENT_URL: https://pmp.academix.tn
      RESEND_API_KEY: ${PMP_RESEND_API_KEY:-}
      RESEND_FROM: ${PMP_RESEND_FROM:-PMP Learn <noreply@academix.tn>}
    networks: [edge]

  quality:
    build:
      context: ../academic-quality-universities
      dockerfile: Dockerfile
    image: ghcr.io/skanderturki/academic-quality:latest
    restart: always
    mem_limit: 640m
    expose:
      - "5000"
    environment:
      NODE_ENV: production
      PORT: "5000"
      MONGODB_URI: mongodb://mongo:27017/psu-quality
      JWT_SECRET: ${QUALITY_JWT_SECRET:?set QUALITY_JWT_SECRET in .env.droplet-b}
      ADMIN_EMAIL: ${QUALITY_ADMIN_EMAIL:?set QUALITY_ADMIN_EMAIL in .env.droplet-b}
      ADMIN_PASSWORD: ${QUALITY_ADMIN_PASSWORD:?set QUALITY_ADMIN_PASSWORD in .env.droplet-b}
      CLIENT_URL: ${QUALITY_CLIENT_URL:-https://quality.academix.tn}
      SMTP_HOST: ${QUALITY_SMTP_HOST:-}
      SMTP_PORT: ${QUALITY_SMTP_PORT:-587}
      SMTP_USER: ${QUALITY_SMTP_USER:-}
      SMTP_PASS: ${QUALITY_SMTP_PASS:-}
      SMTP_FROM: ${QUALITY_SMTP_FROM:-}
      SMTP_SECURE: ${QUALITY_SMTP_SECURE:-false}
      GEMINI_API_KEY: ${QUALITY_GEMINI_API_KEY:-}
      BACKUP_DIR: /app/server/backups
    volumes:
      - quality-backups:/app/server/backups
    depends_on:
      mongo:
        condition: service_healthy
    networks: [internal, edge]

  gallery:
    build:
      context: ./mygalery/nadart_evo
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${NADART_VITE_GOOGLE_CLIENT_ID:-}
    image: ghcr.io/skanderturki/nadart-evo:latest
    restart: always
    mem_limit: 320m
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      JWT_SECRET: ${NADART_JWT_SECRET:?set NADART_JWT_SECRET in .env.droplet-b}
      ADMIN_EMAIL: ${NADART_ADMIN_EMAIL:?set NADART_ADMIN_EMAIL in .env.droplet-b}
      ADMIN_PASSWORD: ${NADART_ADMIN_PASSWORD:?set NADART_ADMIN_PASSWORD in .env.droplet-b}
      GOOGLE_CLIENT_ID: ${NADART_GOOGLE_CLIENT_ID:-}
      N8N_WEBHOOK_URL: https://n8n.academix.tn/webhook/contact
      N8N_AUTH_USER: ${NADART_N8N_AUTH_USER:-nadart}
      N8N_AUTH_PASSWORD: ${NADART_N8N_AUTH_PASSWORD:-}
      MAX_FILE_SIZE: "10485760"
      UPLOAD_DIR: /app/resources/galleries
    volumes:
      - ./mygalery/nadart_evo/data:/app/data
      - ./mygalery/nadart_evo/resources:/app/resources
    networks: [edge]   # SQLite, no Mongo — only needs Caddy reachability

  # bacinfo — already runs in its own compose (/home/bacinfo/bacinfo). Not here.

networks:
  # bacinfo's Caddy network — Caddy reverse_proxies to our services by name on it.
  # Confirm the real name with `docker network ls | grep app` (compose project
  # "bacinfo" + network "app" => bacinfo_app).
  edge:
    external: true
    name: bacinfo_app
  internal:
    driver: bridge

volumes:
  mongo-data:
  quality-backups:
